<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="theme-color"
          content="#07162f">

    <title>
        Presente Especial | Via Pix
    </title>


    <!-- FONTES -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
          rel="stylesheet">


    <!-- CSS -->

    <link rel="stylesheet"
          href="style.css">

</head>


<body>


    <!-- ==================================================
         FUNDO MÁGICO
    =================================================== -->

    <div class="ceu-magico"
         aria-hidden="true">

        <!-- ROSAS CRIADAS PELO JAVASCRIPT -->

        <div id="rosasFlutuantes"></div>


        <!-- VELAS CRIADAS PELO JAVASCRIPT -->

        <div id="velasFlutuantes"></div>


        <!-- PARTÍCULAS CRIADAS PELO JAVASCRIPT -->

        <div id="particulasMagicas"></div>

    </div>



    <!-- ==================================================
         CONTEÚDO PRINCIPAL
    =================================================== -->

    <main class="container">


        <!-- ==================================================
             CARTÃO
        =================================================== -->

        <section class="moldura">


            <!-- ==================================================
                 CONTEÚDO DO CARTÃO
            =================================================== -->

            <div class="conteudo">


                <!-- ==================================================
                     CABEÇALHO
                =================================================== -->

                <div class="cabecalho">


                    <!-- CAIXINHA DE PRESENTE CSS -->

                    <div class="presente-css"
                         aria-hidden="true">

                        <div class="tampa-presente">

                            <span class="laco-esquerdo"></span>

                            <span class="laco-direito"></span>

                            <span class="laco-centro"></span>

                        </div>


                        <div class="corpo-presente">

                            <span class="fita-vertical"></span>

                            <span class="fita-horizontal"></span>

                        </div>

                    </div>


                    <!-- TÍTULO -->

                    <h1>
                        Presente Especial
                    </h1>


                </div>



                <!-- SUBTÍTULO -->

                <h2>
                    Via Pix
                </h2>



                <!-- ==================================================
                     TEXTO
                =================================================== -->

                <div class="texto">

                    <p>
                        Obrigada de coração por desejar me presentear!
                    </p>

                    <p>
                        Por julgar mais prático, optei por não fazer
                        uma lista de presentes.
                    </p>

                    <p>
                        Em vez disso, disponibilizo minha chave Pix.
                    </p>

                </div>



                <!-- ==================================================
                     DADOS DO PIX
                =================================================== -->

                <div class="dados">


                    <!-- NOME -->

                    <h3>
                        Mirella Santos Teles
                    </h3>


                    <!-- BANCO -->

                    <p class="banco">
                        Banco Inter
                    </p>



                    <!-- CHAVE PIX -->

                    <input
                        type="text"
                        id="chavePix"
                        value="79 99940-0547"
                        readonly
                        aria-label="Chave Pix por telefone">



                    <!-- BOTÃO -->

                    <button
                        id="copiarPix"
                        type="button">

                        Copiar Chave Pix

                    </button>



                    <!-- MENSAGEM -->

                    <p
                        id="mensagemPix"
                        class="mensagem"
                        aria-live="polite">
                    </p>


                </div>


            </div>


        </section>


    </main>



    <!-- JAVASCRIPT -->

    <script src="script.js"></script>


</body>

                        </html>
