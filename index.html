<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Presente Especial | Via Pix</title>

    <!-- Fontes -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="style.css">
</head>

<body>

    <!-- ==================================================
         FUNDO MÁGICO
         Os elementos serão criados automaticamente
         pelo JavaScript.
    =================================================== -->

    <div class="ceu-magico" aria-hidden="true">

        <!-- Rosas -->
        <div id="rosasFlutuantes"></div>

        <!-- Velas -->
        <div id="velasFlutuantes"></div>

        <!-- Partículas brilhantes -->
        <div id="particulasMagicas"></div>

    </div>


    <!-- ==================================================
         CONTEÚDO PRINCIPAL
    =================================================== -->

    <main class="container">

        <section class="moldura">

            <!-- Decorações fixas do cartão -->

            <img src="img/rosa.png"
                 class="rosa-esquerda"
                 alt=""
                 aria-hidden="true">

            <img src="img/rosas-lateral.png"
                 class="rosa-direita"
                 alt=""
                 aria-hidden="true">


            <!-- Conteúdo -->

            <div class="conteudo">

                <h1>
                    Presente Especial
                </h1>

                <h2>
                    Via Pix
                </h2>


                <div class="texto">

                    <p>
                        Obrigada de coração por desejar me presentear!
                    </p>

                    <p>
                        Por julgar mais prático, optei por não fazer
                        uma lista de presentes.
                    </p>

                    <p>
                        Em vez disso, disponibilizo minha chave Pix.
                    </p>

                </div>


                <!-- Dados -->

                <div class="dados">

                    <h3>
                        Mirella Santos Teles
                    </h3>

                    <p class="banco">
                        Banco Inter
                    </p>


                    <!-- Chave Pix -->

                    <input
                        type="text"
                        id="chavePix"
                        value="SUA_CHAVE_PIX_AQUI"
                        readonly
                        aria-label="Chave Pix">


                    <!-- Botão -->

                    <button
                        id="copiarPix"
                        type="button">

                        Copiar Chave Pix

                    </button>


                    <!-- Mensagem -->

                    <p
                        id="mensagemPix"
                        class="mensagem"
                        aria-live="polite">
                    </p>

                </div>

            </div>

        </section>

    </main>


    <!-- ==================================================
         JAVASCRIPT
    =================================================== -->

    <script src="script.js"></script>

</body>

    </html>
