<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="theme-color"
          content="#07162f">

    <title>
        Presente Especial | Via Pix
    </title>


    <!-- ==================================================
         FONTES
    =================================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
          rel="stylesheet">


    <!-- ==================================================
         CSS PRINCIPAL
    =================================================== -->

    <link rel="stylesheet"
          href="style.css">

</head>


<body>


    <!-- ==================================================
         FUNDO MÁGICO

         Os elementos abaixo serão preenchidos
         automaticamente pelo script.js.

         • Rosas flutuantes
         • Velas flutuantes
         • Partículas mágicas
    =================================================== -->


    <div class="ceu-magico"
         aria-hidden="true">


        <!-- ROSAS FLUTUANTES -->

        <div id="rosasFlutuantes"></div>


        <!-- VELAS FLUTUANTES -->

        <div id="velasFlutuantes"></div>


        <!-- PARTÍCULAS MÁGICAS -->

        <div id="particulasMagicas"></div>


    </div>



    <!-- ==================================================
         CONTEÚDO PRINCIPAL
    =================================================== -->


    <main class="container">


        <!-- ==================================================
             CARTÃO
        =================================================== -->


        <section class="moldura">


            <!-- ==================================================
                 DECORAÇÃO DO CARTÃO
            =================================================== -->


            <img src="img/rosa.png"
                 class="rosa-esquerda"
                 alt=""
                 aria-hidden="true">


            <img src="img/rosas-lateral.png"
                 class="rosa-direita"
                 alt=""
                 aria-hidden="true">



            <!-- ==================================================
                 CONTEÚDO
            =================================================== -->


            <div class="conteudo">


                <!-- ==================================================
                     TÍTULO
                =================================================== -->


                <h1>
                    Presente Especial
                </h1>


                <h2>
                    Via Pix
                </h2>



                <!-- ==================================================
                     MENSAGEM
                =================================================== -->


                <div class="texto">


                    <p>
                        Obrigada de coração por desejar me presentear!
                    </p>


                    <p>
                        Por julgar mais prático, optei por não fazer
                        uma lista de presentes.
                    </p>


                    <p>
                        Em vez disso, disponibilizo minha chave Pix.
                    </p>


                </div>



                <!-- ==================================================
                     DADOS DO PIX
                =================================================== -->


                <div class="dados">


                    <!-- NOME -->

                    <h3>
                        Mirella Santos Teles
                    </h3>


                    <!-- BANCO -->

                    <p class="banco">
                        Banco Inter
                    </p>



                    <!-- ==================================================
                         CHAVE PIX

                         Número configurado:
                         79 99940-0547
                    =================================================== -->


                    <input
                        type="text"
                        id="chavePix"
                        value="79 99940-0547"
                        readonly
                        aria-label="Chave Pix por telefone">



                    <!-- ==================================================
                         BOTÃO COPIAR
                    =================================================== -->


                    <button
                        id="copiarPix"
                        type="button">

                        Copiar Chave Pix

                    </button>



                    <!-- ==================================================
                         MENSAGEM DE CONFIRMAÇÃO
                    =================================================== -->


                    <p
                        id="mensagemPix"
                        class="mensagem"
                        aria-live="polite">
                    </p>


                </div>


            </div>


        </section>


    </main>



    <!-- ==================================================
         JAVASCRIPT PRINCIPAL

         O script.js será responsável por:

         • Copiar a chave Pix
         • Criar rosas flutuantes
         • Criar velas flutuantes
         • Criar partículas mágicas
         • Animar o fundo
    =================================================== -->


    <script src="script.js"></script>


</body>

</html>
