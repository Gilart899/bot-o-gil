<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Presente Via Pix | Mirella Santos Teles</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="ceu"></div>
<div class="estrelas"></div>
<div class="nevoa"></div>
<div class="particulas"></div>

<div class="container">

    <div class="moldura">

        <!-- Rosas -->
        <img src="img/rosa.png" class="rosa-esquerda" alt="Rosa">

        <img src="img/rosas-lateral.png" class="rosa-direita" alt="Rosas">

        <div class="conteudo">

            <h1>🎁 Presente Especial</h1>

            <h2>Via Pix</h2>

            <p class="texto">

                <strong>Obrigada de coração por desejar me presentear!</strong>

                <br><br>

                Por julgar mais prático, optei por não fazer uma lista de presentes.

                <br><br>

                Caso deseje, você pode utilizar minha chave Pix abaixo.

            </p>

            <div class="dados">

                <h3>Mirella Santos Teles</h3>

                <p class="banco">Banco Inter</p>

                <input
                    id="chavePix"
                    type="text"
                    readonly
                    value="79 99940-0547">

                <button id="copiarPix">

                    📋 Copiar Chave Pix

                </button>

                <div id="mensagemPix" class="mensagem"></div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
